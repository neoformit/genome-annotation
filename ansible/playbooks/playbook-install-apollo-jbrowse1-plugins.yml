---
# Install JBrowse1 plugins into the JBrowse embedded in Apollo's WAR.
# Reads apollo_jbrowse1_plugins from host_vars/group_vars (empty = no-op).
# Does NOT redeploy the WAR - assumes Apollo is already deployed and healthy.
#
# Usage:
#   ansible-playbook playbook-install-apollo-jbrowse1-plugins.yml \
#     --inventory-file hosts \
#     --limit apollo-037.genome.edu.au

- hosts: all
  remote_user: ubuntu
  become: yes
  become_method: sudo
  connection: "ssh"

  tasks:
    - import_role:
        name: apollo-install-jbrowse1-plugins
