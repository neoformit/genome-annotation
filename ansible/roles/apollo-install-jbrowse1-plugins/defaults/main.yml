---
# Path where Tomcat auto-extracts the Apollo WAR
apollo_webapp_path: "/var/lib/tomcat9/webapps/apollo"

# Owner/group Tomcat runs as (used for chown of the plugin tree)
apollo_tomcat_user: "tomcat"
apollo_tomcat_group: "tomcat"

# Seconds to wait for Tomcat to finish extracting the WAR before installing plugins
apollo_webapp_extract_timeout: 180

# List of JBrowse1 plugins to install into the Apollo-embedded JBrowse.
# Override in host_vars or group_vars. Each entry supports:
#   name:    plugin ID (also the folder name inside jbrowse/plugins/) - REQUIRED
#   repo:    git URL of the plugin - REQUIRED
#   version: git ref (default 'master')
#   config:  optional dict of extra key/value lines rendered inside the
#            [plugins.<name>] block in jbrowse.conf
# Example:
#   apollo_jbrowse1_plugins:
#     - name: MethylationPlugin
#       repo: "https://github.com/bhofmei/jbplugin-methylation"
#       version: master
#       config:
#         extendedModifications: "true"
apollo_jbrowse1_plugins: []
